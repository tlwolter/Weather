<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>WS-2000 Phone Dashboard</title>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
  <style>

    /* ════════════════════════════════════════════════
       COLOR SETTINGS — edit these to retheme
       ════════════════════════════════════════════════
       --color-outdoor  : outdoor temp, dewpoint, feels like
       --color-indoor   : indoor temp
       --color-wind     : wind gust, wind direction
       --color-rain     : daily rain
       --color-enviro   : UV index
       --color-ui       : header date, time, labels
    ════════════════════════════════════════════════ */
    :root {
      --color-outdoor:  #FF0800;
      --color-indoor:   #FF0800;
      --color-wind:     #00aaff;
      --color-rain:     #44cc44;
      --color-enviro:   #FFA500; 
      --color-ui:       #CCCCCC;

      --color-bg-page:  #000000;
      --color-bg-card:  #0c0c0c;
      --color-border:   #1e1e1e;
    }
    /* ════════════════════════════════════════════════ */

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--color-bg-page);
      width: 100%;
      /* dvh = dynamic viewport height — accounts for browser chrome on mobile */
      height: 100dvh;
      overflow: hidden;
    }

    #dash {
      width: 100%;
      height: 100dvh;
      background: var(--color-bg-page);
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      padding: 1.5vw;
      gap: 1.5vw;
    }

    /* ── HEADER ── */
    .hdr {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 1vw;
      flex-shrink: 0;
    }
    .hdr-date { font-size: 3.8vw; font-weight: bold; color: var(--color-ui); }
    .hdr-time { font-size: 3.8vw; font-weight: bold; color: var(--color-ui); }

    /* ── GRID: 2 cols x 4 rows ── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: repeat(4, 1fr);
      gap: 1.5vw;
      flex: 1;
      min-height: 0;
    }

    /* ── CARDS ── */
    .card {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: 2vw;
      padding: 1.5vw 2.5vw;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
      min-height: 0;
    }

    .lbl {
      font-size: 3vw;
      font-style: italic;
      line-height: 1;
      margin-bottom: 0.4vh;
      white-space: nowrap;
    }

    /* Value — sized to fill each card */
    .val {
      font-size: 10.5vw;
      font-weight: bold;
      line-height: 1;
    }

    .unit {
      font-size: 4vw;
      font-weight: bold;
      line-height: 1;
    }

    /* Category colors applied to both label and value */
    .outdoor { color: var(--color-outdoor); }
    .indoor  { color: var(--color-indoor);  }
    .wind    { color: var(--color-wind);    }
    .rain    { color: var(--color-rain);    }
    .enviro  { color: var(--color-enviro);  }

    /* ── FOOTER ── */
    .footer {
      font-size: 2.6vw;
      color: #333;
      text-align: center;
      flex-shrink: 0;
      padding-bottom: 0.5vw;
    }
  </style>
</head>
<body>
<div id="dash">

  <div class="hdr">
    <span class="hdr-date" id="hdr-date">--</span>
    <span id="fetch-status" style="font-size:3vw;color:#555;">Loading...</span>
    <span class="hdr-time" id="hdr-time">--</span>
  </div>

  <div style="text-align:center;font-size:4vw;font-weight:bold;color:var(--color-ui);letter-spacing:0.05em;flex-shrink:0;padding:0.5vw 0;">NE Chatfield</div>

  <div class="grid">

    <!-- Row 1: Outdoor Temp | Dewpoint -->
    <div class="card">
      <div class="lbl outdoor">Outdoor Temp</div>
      <div class="val outdoor"><span id="temp-out">--</span><span class="unit">°F</span></div>
    </div>
    <div class="card">
      <div class="lbl outdoor">Dewpoint</div>
      <div class="val outdoor"><span id="dewpoint">--</span><span class="unit">°F</span></div>
    </div>

    <!-- Row 2: Feels Like | Indoor Temp -->
    <div class="card">
      <div class="lbl outdoor">Feels Like</div>
      <div class="val outdoor"><span id="feels-like">--</span><span class="unit">°F</span></div>
    </div>
    <div class="card">
      <div class="lbl indoor">Indoor Temp</div>
      <div class="val indoor"><span id="temp-in">--</span><span class="unit">°F</span></div>
    </div>

    <!-- Row 3: Wind Gust | 10-Min Wind Dir -->
    <div class="card">
      <div class="lbl wind">Wind Gust</div>
      <div class="val wind"><span id="wind-gust">--</span><span class="unit"> mph</span></div>
    </div>
    <div class="card">
      <div class="lbl wind">10-Min Wind Dir</div>
      <div class="val wind" id="wind-avg-dir">--</div>
    </div>

    <!-- Row 4: Daily Rain | UV Index -->
    <div class="card">
      <div class="lbl rain">Daily Rain</div>
      <div class="val rain"><span id="rain-daily">--</span><span class="unit"> in</span></div>
    </div>
    <div class="card">
      <div class="lbl enviro">UV Index</div>
      <div class="val enviro" id="uv">--</div>
    </div>

  </div>

  <div class="footer" id="footer-updated"></div>

</div>
<script>
  // ── CONFIG ─────────────────────────────────────────
  const API_KEY         = '9dcf9b3091e54c62bf6d0dfc94b8f486a95b2935800141b5ba72a886c2d13656';
  const APP_KEY         = '22a9f87703874e85b28d5e1572dca6652ff8b050503142f19430ac2d6b523d51';
  const REFRESH_SECONDS = 15;
  // ───────────────────────────────────────────────────

  const API_URL = 'https://ambient-weather-proxy.tlwolter.workers.dev';

  function degToDir(d){return['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(d/22.5)%16];}
  function v(x,d=1){return(x===undefined||x===null)?'--':Number(x).toFixed(d);}
  function set(id,txt){const e=document.getElementById(id);if(e)e.textContent=txt;}

  async function fetchData(){
    try{
      set('fetch-status','...');
      document.getElementById('fetch-status').style.color='#555';
      const resp=await fetch(API_URL);
      if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
      const data=await resp.json();
      if(!data||!data.length)throw new Error('No devices');
      const d=data[0].lastData;

      set('fetch-status','Live ●');
      document.getElementById('fetch-status').style.color='#44cc44';

      set('temp-out',   v(d.tempf,1));
      set('dewpoint',   v(d.dewPoint,1));
      set('feels-like', v(d.feelsLike,1));
      set('temp-in',    v(d.tempinf,1));
      set('wind-gust',  v(d.windgustmph,1));
      set('wind-avg-dir', degToDir(d.winddir_avg10m)+' '+v(d.winddir_avg10m,0)+'°');
      set('rain-daily', v(d.dailyrainin,2));
      set('uv',         v(d.uv,0));

      set('footer-updated','Updated: '+new Date().toLocaleTimeString());
    }catch(e){
      set('fetch-status','Err');
      document.getElementById('fetch-status').style.color='#ff4444';
    }
  }

  function updateClock(){
    const n=new Date();
    set('hdr-date',n.toLocaleDateString('en-US',{month:'short',day:'numeric'}));
    set('hdr-time',n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'}));
  }

  updateClock();
  setInterval(updateClock,1000);
  fetchData();
  setInterval(fetchData,REFRESH_SECONDS*1000);
</script>
</body>
</html>
